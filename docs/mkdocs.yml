site_name: Agentic PCB Design Assistant
theme:
  name: material

nav:
  - Home: index.md
  - Architecture: architecture.md
  - Core: core/
  - ADRs: adr/

plugins:
  - mkdocstrings:
      default_handler: python
      handlers:
        python:
          paths: [src]
          options:
            show_source: true
            show_root_heading: false

markdown_extensions:
  - pymdownx.highlight
  - pymdownx.superfences
